<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thornbugh - Perfect City</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0f1a; font-family: 'Georgia', serif; overflow: hidden; }
  #canvas { display: block; }
  #title-card {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none;
  }
  #title-card h1 { font-size: 2.2rem; letter-spacing: 0.3em; color: #e8d5a3; font-weight: 300; text-shadow: 0 0 30px rgba(232,213,163,0.4); }
  #title-card p { font-size: 0.7rem; letter-spacing: 0.25em; color: #7a9e8a; text-transform: uppercase; margin-top: 4px; }
  #legend {
    position: fixed; bottom: 20px; left: 20px;
    background: rgba(8,12,22,0.88); border: 1px solid rgba(232,213,163,0.18);
    border-radius: 8px; padding: 14px 18px; max-width: 210px;
  }
  #legend h3 { color: #e8d5a3; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 9px; }
  .li { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .ld { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .ll { font-size: 0.65rem; color: #b0c4b8; }
  #controls {
    position: fixed; bottom: 20px; right: 20px;
    background: rgba(8,12,22,0.88); border: 1px solid rgba(232,213,163,0.18);
    border-radius: 8px; padding: 14px 18px;
  }
  #controls p { font-size: 0.6rem; color: #7a9e8a; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 7px; }
  .ctrl { font-size: 0.62rem; color: #b0c4b8; margin-bottom: 3px; }
  #layers {
    position: fixed; top: 90px; right: 20px;
    background: rgba(8,12,22,0.88); border: 1px solid rgba(232,213,163,0.18);
    border-radius: 8px; padding: 14px 18px;
  }
  #layers h3 { color: #e8d5a3; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 9px; }
  .lbtn {
    display: block; width: 100%; text-align: left;
    background: transparent; border: 1px solid rgba(255,255,255,0.1);
    color: #b0c4b8; font-size: 0.62rem; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 5px 9px; margin-bottom: 4px;
    cursor: pointer; border-radius: 4px; transition: all 0.2s;
  }
  .lbtn:hover { border-color: rgba(232,213,163,0.35); color: #e8d5a3; }
  .lbtn.on { background: rgba(122,158,138,0.18); border-color: #7a9e8a; color: #7a9e8a; }
  #stats {
    position: fixed; top: 90px; left: 20px;
    background: rgba(8,12,22,0.88); border: 1px solid rgba(232,213,163,0.18);
    border-radius: 8px; padding: 14px 18px; min-width: 185px;
  }
  #stats h3 { color: #e8d5a3; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 9px; }
  .stat { font-size: 0.65rem; color: #b0c4b8; margin-bottom: 4px; }
  .stat span { color: #e8d5a3; }
  #tip {
    position: fixed; pointer-events: none; display: none;
    background: rgba(8,12,22,0.95); border: 1px solid rgba(232,213,163,0.35);
    border-radius: 6px; padding: 9px 13px;
    color: #e8d5a3; font-size: 0.72rem; line-height: 1.55; max-width: 190px;
  }
</style>
</head>
<body>

<div id="title-card">
  <h1>Thronburgh</h1>
  <p>Landlocked Europe &nbsp;·&nbsp; 150 sq mi &nbsp;·&nbsp; Pop. 4,000,000</p>
</div>

<div id="tip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var W = window.innerWidth, H = window.innerHeight;
var canvas = document.getElementById('canvas');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x08101e);

var camera = new THREE.PerspectiveCamera(48, W/H, 0.5, 2000);
camera.position.set(0, 140, 210);
camera.lookAt(0, 0, 0);

// Lighting
scene.add(new THREE.AmbientLight(0x334466, 0.7));
var sun = new THREE.DirectionalLight(0xfff5e0, 2.8);
sun.position.set(80, 160, 60);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 500;
sun.shadow.camera.left = -180;
sun.shadow.camera.right = 180;
sun.shadow.camera.top = 180;
sun.shadow.camera.bottom = -180;
scene.add(sun);
var fill = new THREE.DirectionalLight(0x4466aa, 0.7);
fill.position.set(-60, 40, -100);
scene.add(fill);
scene.add(new THREE.HemisphereLight(0x334455, 0x223322, 0.5));

// Materials
var MAT = {
  ground:      new THREE.MeshLambertMaterial({ color: 0x151f12 }),
  grass:       new THREE.MeshLambertMaterial({ color: 0x3d8b5e }),
  darkGrass:   new THREE.MeshLambertMaterial({ color: 0x2d6e40 }),
  wetland:     new THREE.MeshLambertMaterial({ color: 0x4a7c45 }),
  garden:      new THREE.MeshLambertMaterial({ color: 0x7ab840 }),
  water:       new THREE.MeshLambertMaterial({ color: 0x1a5a7a, transparent: true, opacity: 0.85 }),
  brownA:      new THREE.MeshLambertMaterial({ color: 0xb8895a }),
  brownB:      new THREE.MeshLambertMaterial({ color: 0xc9a06e }),
  brownC:      new THREE.MeshLambertMaterial({ color: 0xa07848 }),
  brownRoof:   new THREE.MeshLambertMaterial({ color: 0x6a3a20 }),
  skyA:        new THREE.MeshLambertMaterial({ color: 0x7ab3c4 }),
  skyB:        new THREE.MeshLambertMaterial({ color: 0x5a9eb8 }),
  skyGlass:    new THREE.MeshLambertMaterial({ color: 0xaaddee, transparent: true, opacity: 0.78 }),
  vgarden:     new THREE.MeshLambertMaterial({ color: 0x2d6e4a }),
  vleaf:       new THREE.MeshLambertMaterial({ color: 0x48a060 }),
  transit:     new THREE.MeshLambertMaterial({ color: 0xd4a853 }),
  transitDark: new THREE.MeshLambertMaterial({ color: 0xa07030 }),
  pedestrian:  new THREE.MeshLambertMaterial({ color: 0xd8c89a }),
  dam:         new THREE.MeshLambertMaterial({ color: 0x7a6a5a }),
  damDark:     new THREE.MeshLambertMaterial({ color: 0x5a4a3a }),
  solar:       new THREE.MeshLambertMaterial({ color: 0x2244aa, emissive: new THREE.Color(0x1133aa), emissiveIntensity: 0.4 }),
  solarFrame:  new THREE.MeshLambertMaterial({ color: 0x888888 }),
  forest:      new THREE.MeshLambertMaterial({ color: 0x2a5a30 }),
  forestDark:  new THREE.MeshLambertMaterial({ color: 0x1e4225 }),
  trunk:       new THREE.MeshLambertMaterial({ color: 0x5a3a20 }),
  path:        new THREE.MeshLambertMaterial({ color: 0xe8d5a3 }),
  pathDark:    new THREE.MeshLambertMaterial({ color: 0xc8b080 }),
  rail:        new THREE.MeshLambertMaterial({ color: 0x888888 }),
  petal:       new THREE.MeshLambertMaterial({ color: 0x3a7a50, transparent: true, opacity: 0.92 }),
};

// Layer Groups
var G = {
  base:      new THREE.Group(),
  green:     new THREE.Group(),
  transit:   new THREE.Group(),
  buildings: new THREE.Group(),
  water:     new THREE.Group(),
  solar:     new THREE.Group(),
};
Object.keys(G).forEach(function(k) { scene.add(G[k]); });

// Helpers
function rng(a, b) { return a + Math.random() * (b - a); }

function mkBox(w, h, d, mat, x, y, z, ry, grp, lbl) {
  var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  if (ry) m.rotation.y = ry;
  m.castShadow = true; m.receiveShadow = true;
  if (lbl) m.userData.label = lbl;
  grp.add(m); return m;
}

function mkCyl(rt, rb, h, seg, mat, x, y, z, grp, lbl) {
  var m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  if (lbl) m.userData.label = lbl;
  grp.add(m); return m;
}

function mkSphere(r, seg, mat, x, y, z, grp, lbl) {
  var m = new THREE.Mesh(new THREE.SphereGeometry(r, seg, seg), mat);
  m.position.set(x, y, z);
  m.castShadow = true;
  if (lbl) m.userData.label = lbl;
  grp.add(m); return m;
}

function mkTube(pts, rad, mat, grp, lbl) {
  var curve = new THREE.CatmullRomCurve3(pts);
  var geo = new THREE.TubeGeometry(curve, pts.length * 6, rad, 6, false);
  var m = new THREE.Mesh(geo, mat);
  m.receiveShadow = true;
  if (lbl) m.userData.label = lbl;
  grp.add(m); return m;
}

function V3(x, y, z) { return new THREE.Vector3(x, y, z); }

// Scale: 1 unit ~ 100m. City radius ~108 units for 150 sq mi
var CITY_R = 108;
var RIVER_W = 14;
var PETAL_R = 72;
var PETAL_W = 38;
var PETAL_N = 6;
var INNER_R = 22;
var DAM_X = -105;

// Ground
var gm = new THREE.Mesh(new THREE.CircleGeometry(CITY_R + 20, 128), MAT.ground);
gm.rotation.x = -Math.PI / 2;
gm.receiveShadow = true;
G.base.add(gm);

// River
mkBox(260, 0.4, RIVER_W * 2, MAT.water, 0, 0, 0, 0, G.water, 'The Vela River\nWidth: ~180m\nCentral waterway');
mkBox(260, 0.18, 8, MAT.wetland, 0, 0.12, -(RIVER_W + 4), 0, G.green, 'North Wetland Restoration\nReed beds + native aquatics\nStormwater filtration');
mkBox(260, 0.18, 8, MAT.wetland, 0, 0.12, (RIVER_W + 4), 0, G.green, 'South Wetland Restoration\nReed beds + native aquatics\nStormwater filtration');
mkBox(250, 0.15, 5, MAT.pedestrian, 0, 0.16, -(RIVER_W + 11), 0, G.base, 'North Riverside Promenade\n18m wide pedestrian boulevard\nBike lane + tram stop every 400m');
mkBox(250, 0.15, 5, MAT.pedestrian, 0, 0.16, (RIVER_W + 11), 0, G.base, 'South Riverside Promenade\n18m wide pedestrian boulevard\nBike lane + tram stop every 400m');

// Pedestrian Bridges
var bridgeXs = [-80, -55, -30, -5, 20, 45, 70, 95];
for (var bi = 0; bi < bridgeXs.length; bi++) {
  var bx = bridgeXs[bi];
  mkBox(5, 0.8, RIVER_W * 2.4, MAT.pedestrian, bx, 1.0, 0, 0, G.base, 'Pedestrian Bridge ' + (bi+1) + '\nCycle + walking only\nViewpoints over Vela River');
  mkBox(5, 1.2, 0.25, MAT.rail, bx, 1.6, -(RIVER_W + 0.2), 0, G.base, null);
  mkBox(5, 1.2, 0.25, MAT.rail, bx, 1.6, (RIVER_W + 0.2), 0, G.base, null);
  mkBox(0.5, 0.6, 0.5, MAT.pedestrian, bx, 0.3, -RIVER_W*1.2, 0, G.base);
  mkBox(0.5, 0.6, 0.5, MAT.pedestrian, bx, 0.3, RIVER_W*1.2, 0, G.base);
}

// Flower road grid
(function() {
  var roadMat = new THREE.MeshLambertMaterial({ color: 0x303040 });
  var roadsGrp = new THREE.Group();
  scene.add(roadsGrp);
  var roadY = 0.13;

  // — Concentric ring roads (tube circles) —
  [INNER_R, 44, 68, 92].forEach(function(R, ri) {
    var N = 128, pts = [];
    for (var i = 0; i <= N; i++) {
      var a = (i / N) * Math.PI * 2;
      pts.push(new THREE.Vector3(Math.cos(a) * R, roadY, Math.sin(a) * R));
    }
    var tubRad = [0.95, 0.85, 0.80, 0.70][ri];
    var curve = new THREE.CatmullRomCurve3(pts, true);
    var m = new THREE.Mesh(new THREE.TubeGeometry(curve, 512, tubRad, 6, true), roadMat);
    m.receiveShadow = true;
    roadsGrp.add(m);
  });

  // — 6 radial spokes at inter-petal angles: 30, 90, 150, 210, 270, 330 deg —
  // (offset from petal axes so they run through the green corridors, not the river)
  [1, 3, 5, 7, 9, 11].forEach(function(n) {
    var a = n * Math.PI / 6;
    var R1 = INNER_R, R2 = CITY_R - 4;
    var len = R2 - R1;
    var m = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.12, len), roadMat);
    m.position.set(Math.cos(a) * (R1 + R2) / 2, roadY, Math.sin(a) * (R1 + R2) / 2);
    m.rotation.y = Math.PI / 2 - a;
    m.receiveShadow = true;
    roadsGrp.add(m);
  });

  // — Petal-arc connectors between adjacent spokes —
  // Arc outward between each pair of adjacent spokes at two mid-ring levels,
  // creating convex petal shapes visible from above.
  var spokeBase = [1, 3, 5, 7, 9, 11].map(function(n) { return n * Math.PI / 6; });
  [44, 68].forEach(function(R, li) {
    var bulgeAmt = [0.20, 0.16][li];
    spokeBase.forEach(function(a1) {
      var a2 = a1 + Math.PI / 3; // next spoke, 60° ahead (no wrap issues)
      var pts = [];
      for (var i = 0; i <= 20; i++) {
        var t = i / 20;
        var ang = a1 + t * (a2 - a1);
        var r = R * (1 + bulgeAmt * Math.sin(t * Math.PI)); // bow outward at midpoint
        pts.push(new THREE.Vector3(Math.cos(ang) * r, roadY, Math.sin(ang) * r));
      }
      var curve = new THREE.CatmullRomCurve3(pts);
      var m = new THREE.Mesh(new THREE.TubeGeometry(curve, 80, 0.75, 5, false), roadMat);
      m.receiveShadow = true;
      roadsGrp.add(m);
    });
  });

  // — Inner chord connectors at the inner ring —
  // Short straight roads connecting adjacent spoke roots to form a hexagonal core.
  spokeBase.forEach(function(a1) {
    var a2 = a1 + Math.PI / 3;
    var R = INNER_R;
    var p1x = Math.cos(a1) * R, p1z = Math.sin(a1) * R;
    var p2x = Math.cos(a2) * R, p2z = Math.sin(a2) * R;
    var cx = (p1x + p2x) / 2, cz = (p1z + p2z) / 2;
    var cLen = Math.sqrt(Math.pow(p2x-p1x,2) + Math.pow(p2z-p1z,2));
    var cAngle = Math.atan2(p2z - p1z, p2x - p1x);
    var m = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.12, cLen), roadMat);
    m.position.set(cx, roadY, cz);
    m.rotation.y = Math.PI / 2 - cAngle;
    m.receiveShadow = true;
    roadsGrp.add(m);
  });
})();

// Bridge ramps
(function() {
  var rampTopY  = 1.4;                                          // bridge deck top (y=1.0 + h/2=0.4)
  var rampGndY  = 0.235;                                        // promenade top (y=0.16 + h/2=0.075)
  var rampNearZ = RIVER_W * 1.2;                                // bridge end edge
  var rampFarZ  = RIVER_W + 8.5;                                // promenade inner edge
  var rampHLen  = rampFarZ - rampNearZ;                         // horizontal span
  var rampMidZ  = (rampNearZ + rampFarZ) / 2;
  var rampMidY  = (rampTopY + rampGndY) / 2;
  var rampDrop  = rampTopY - rampGndY;
  var rampAngle = Math.atan2(rampDrop, rampHLen);
  var rampSLen  = Math.sqrt(rampHLen * rampHLen + rampDrop * rampDrop);
  var rampGeo   = new THREE.BoxGeometry(5, 0.15, rampSLen);
  for (var rbi = 0; rbi < bridgeXs.length; rbi++) {
    var rbx = bridgeXs[rbi];
    var ms = new THREE.Mesh(rampGeo, MAT.pedestrian);
    ms.rotation.x = rampAngle;
    ms.position.set(rbx, rampMidY, rampMidZ);
    ms.castShadow = true; ms.receiveShadow = true;
    G.base.add(ms);
    var mn = new THREE.Mesh(rampGeo, MAT.pedestrian);
    mn.rotation.x = -rampAngle;
    mn.position.set(rbx, rampMidY, -rampMidZ);
    mn.castShadow = true; mn.receiveShadow = true;
    G.base.add(mn);
  }
})();

// Orbit controls
var dragging = false, rightDrag = false;
var prev = { x: 0, y: 0 };
var sph = { theta: 0.45, phi: 0.75, r: 210 };
var tgt = new THREE.Vector3(0, 0, 0);

function updateCam() {
  camera.position.set(
    tgt.x + sph.r * Math.sin(sph.phi) * Math.sin(sph.theta),
    tgt.y + sph.r * Math.cos(sph.phi),
    tgt.z + sph.r * Math.sin(sph.phi) * Math.cos(sph.theta)
  );
  camera.lookAt(tgt);
}
updateCam();

canvas.addEventListener('mousedown', function(e) { dragging=true; rightDrag=e.button===2; prev={x:e.clientX,y:e.clientY}; });
canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
window.addEventListener('mouseup', function() { dragging=false; });
window.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var dx=e.clientX-prev.x, dy=e.clientY-prev.y;
  prev={x:e.clientX,y:e.clientY};
  if (rightDrag) { tgt.x-=dx*0.18; tgt.z-=dy*0.18; }
  else { sph.theta-=dx*0.007; sph.phi=Math.max(0.08,Math.min(1.52,sph.phi+dy*0.007)); }
  updateCam();
});
canvas.addEventListener('wheel', function(e) { sph.r=Math.max(20,Math.min(400,sph.r+e.deltaY*0.18)); updateCam(); });

// Tooltip
var raycaster = new THREE.Raycaster();
var mouse2 = new THREE.Vector2();
var tip = document.getElementById('tip');
var allMeshes = [];
scene.traverse(function(o) { if (o.isMesh && o.userData.label) allMeshes.push(o); });

window.addEventListener('mousemove', function(e) {
  mouse2.x=(e.clientX/window.innerWidth)*2-1;
  mouse2.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse2, camera);
  var hits = raycaster.intersectObjects(allMeshes);
  if (hits.length>0 && hits[0].object.userData.label) {
    tip.style.display='block';
    tip.style.left=(e.clientX+16)+'px';
    tip.style.top=(e.clientY-10)+'px';
    tip.innerHTML=hits[0].object.userData.label.replace(/\n/g,'<br>');
  } else { tip.style.display='none'; }
});

// Layer toggles
document.querySelectorAll('.lbtn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    btn.classList.toggle('on');
    var key=btn.id.replace('btn-','');
    G[key].visible=!G[key].visible;
  });
});

// Animate
var tick = 0;
function animate() {
  requestAnimationFrame(animate);
  tick += 0.008;
  G.water.children.forEach(function(m, idx) {
    if (m.material && m.material.transparent) m.material.opacity = 0.78 + Math.sin(tick*1.1+idx)*0.06;
  });
  G.solar.children.forEach(function(m, idx) {
    if (m.material && m.material.emissiveIntensity !== undefined) m.material.emissiveIntensity = 0.3 + Math.sin(tick*0.8+idx*0.4)*0.12;
  });
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', function() {
  var W2=window.innerWidth, H2=window.innerHeight;
  camera.aspect=W2/H2; camera.updateProjectionMatrix();
  renderer.setSize(W2,H2);
});
</script>
</body>
</html>
